name: Continuous Integration & Vercel deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  validate_and_test:
    name: Code Validation and Quality Controls
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pnpm Core Engine
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 9.0.0

      - name: Initialize Structured Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install workspace Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Types Checkout
        run: pnpm checktypes

      - name: Lint Codebase via Turborepo
        run: pnpm turbo lint

      - name: Run Test Suite via Turborepo
        run: pnpm turbo test

      - name: Execute SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: "-Dsonar.projectKey=lizardkingLK_alice -Dsonar.organization=lizardkinglk -Dsonar.host.url=https://sonarcloud.io -Dsonar.qualitygate.wait=true"

  deploy_backend_api:
    name: Deploy Express API to Vercel
    needs: validate_and_test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Pnpm Core Engine
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 9

      - name: Initialize Structured Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Global Vercel CLI Execution Agent
        run: pnpm install --global vercel@latest --ignore-scripts

      - name: Pull Vercel Environment Variables
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

      - name: Build Local App Context via Vercel CLI
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

      - name: Execute Controlled Production Deployment
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

  deploy_frontend_web:
    name: Deploy Web Frontend to Vercel
    needs: validate_and_test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Pnpm Core Engine
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 9

      - name: Initialize Structured Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Global Vercel CLI Execution Agent
        run: pnpm install --global vercel@latest --ignore-scripts

      - name: Pull Vercel Environment Variables
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Build Local App Context via Vercel CLI
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Execute Controlled Production Deployment
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
